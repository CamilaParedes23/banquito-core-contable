server:
  port: ${SERVER_PORT:8084}
  forward-headers-strategy: framework

spring:
  application:
    name: ${SPRING_APPLICATION_NAME:core-accounting-service}
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  datasource:
    url: ${ACCOUNTING_DB_URL:${DB_URL:jdbc:mysql://localhost:33065/banquito_core_accounting_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Guayaquil}}
    username: ${ACCOUNTING_DB_USER:${DB_USERNAME:root}}
    password: ${ACCOUNTING_DB_PASSWORD:${DB_PASSWORD:BanQuitoRoot2026!}}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: ${DB_MAX_POOL_SIZE:10}
      minimum-idle: ${DB_MIN_IDLE:2}
      connection-timeout: ${DB_CONNECTION_TIMEOUT_MS:30000}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
        implicit-strategy: org.hibernate.boot.model.naming.ImplicitNamingStrategyJpaCompliantImpl
    properties:
      hibernate:
        format_sql: ${HIBERNATE_FORMAT_SQL:true}
        jdbc:
          time_zone: ${APP_TIMEZONE:America/Guayaquil}
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    baseline-on-migrate: ${FLYWAY_BASELINE_ON_MIGRATE:true}
    baseline-version: ${FLYWAY_BASELINE_VERSION:1}
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: ${ACTUATOR_ENDPOINTS:health,info}
  endpoint:
    health:
      show-details: ${ACTUATOR_HEALTH_DETAILS:always}
  health:
    db:
      enabled: true

springdoc:
  api-docs:
    path: ${OPENAPI_DOCS_PATH:/api-docs}
  swagger-ui:
    path: ${SWAGGER_UI_PATH:/swagger-ui.html}

banquito:
  security:
    jwt:
      issuer: ${JWT_ISSUER:banquito-identity-access}
      secret: ${JWT_SECRET:BanQuitoIdentityJwtSecretKeyForDevelopmentOnlyChangeMe2026}
  accounting:
    default-cutoff-time: ${ACCOUNTING_DEFAULT_CUTOFF_TIME:20:00:00}
  integration:
    document-service-url: ${DOCUMENT_SERVICE_URL:http://document-service:8086}
    notification-service-url: ${NOTIFICATION_SERVICE_URL:http://notification-service:8087}
  grpc:
    server:
      port: ${GRPC_SERVER_PORT:9094}
